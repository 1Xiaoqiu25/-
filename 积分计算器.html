<!DOCTYPE html>
<html>
<head>
    <title>积分计算器（新增）</title>
    <style>
        body { 
            font-family: 微软雅黑, sans-serif; 
            background: #f0f4f7;
            margin: 20px;
        }
        .container {
            width: 360px;
            margin: 0 auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2a5c9d;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            color: #333;
            margin-bottom: 5px;
        }
        select, .checkbox-group, input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .checkbox-group label {
            display: block;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2a5c9d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .highlight {
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>积分计算器</h2>

        <!-- 套餐选择 -->
        <div class="form-group">
            <label>选择套餐：</label>
            <select id="package">
                <option value="389">全家福389元</option>
                <option value="359">全家福359元</option>
                <option value="299">全家福299元</option>
                <option value="289">全家福289元</option>
                <option value="259">全家福259元</option>
                <option value="239">全家福239元</option>
                <option value="209">全家福209元</option>
                <option value="199">全家福199元</option>
                <option value="169">全家福169元</option>
                <option value="139">全家福139元</option>
                <option value="99">全家福99元</option>
                <option value="79">全家福79元</option>
                <option value="59">流量王59元</option>
                <option value="39">流量王39元</option>
            </select>
        </div>

        <!-- 用户类型 -->
        <div class="form-group">
            <label>用户类型：</label>
            <select id="userType">
                <option value="1">异网用户</option>
                <option value="0.2">本网用户</option>
            </select>
        </div>

        <!-- 融合选项 -->
        <div class="form-group">
            <label>融合选项：</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="fusion" value="-0.2"> 单卡</label>
                <label><input type="checkbox" name="fusion" value="0.2"> 移移融合</label>
                <label><input type="checkbox" name="fusion" value="0.5" id="yikuan"> 融合1宽</label>
                <label><input type="checkbox" name="fusion" value="0.5" id="yikuan"> 融合2宽</label>
                <label><input type="checkbox" name="fusion" value="0.7" id="fttr"> FTTR/云智同装</label>
                <label><input type="checkbox" name="fusion" value="0.6"> 终端合约系数</label>
            </div>
        </div>

        <!-- 名单制用户 -->
        <div class="form-group">
            <label>名单制用户：</label>
            <select id="baoHao">
                <option value="1.2">是</option>
                <option value="1.0">否</option>
            </select>
        </div>

        <!-- 渠道类型 -->
        <div class="form-group">
            <label>渠道类型：</label>
            <select id="channel">
                <option value="1">本人发展</option>
                <option value="0.5">看管渠道/合伙人</option>
            </select>
        </div>

        <!-- 是否节假日 -->
        <div class="form-group">
            <label>是否节假日：</label>
            <select id="holiday">
                <option value="1.1">是</option>
                <option value="1.0">否</option>
            </select>
        </div>

        <!-- 生产作业贡献系数 -->
        <div class="form-group">
            <label>生产作业贡献系数（0.36-1.56）：</label>
            <input type="number" id="starFactor" step="0.1" min="0" max="3" value="1.0">
        </div>

        <!-- 积分单价输入 -->
        <div class="form-group">
            <label>积分单价（元/分）：</label>
            <input type="number" id="unitPrice" step="0.01" value="1.00">
        </div>

        <button onclick="calculate()">立即计算</button>
        <div id="result"></div>
    </div>

    <script>
        const packageRules = {
            '389': { base: 389, value: 1.8 },
            '359': { base: 359, value: 1.8 },
            '299': { base: 299, value: 1.8 },
            '289': { base: 289, value: 1.8 },
            '259': { base: 259, value: 1.8 },
            '239': { base: 239, value: 1.8 },
            '209': { base: 209, value: 1.8 },
            '199': { base: 199, value: 1.8 },
            '169': { base: 169, value: 1.8 },
            '139': { base: 139, value: 1.5 },
            '99': { base: 99, value: 1.3 },
            '79': { base: 79, value: 1.0 },
            '59': { base: 59, value: 0.5 },
            '39': { base: 39, value: 0.5 },
        };

        function calculate() {
            // 获取参数
            const package = document.getElementById('package').value;
            const userType = parseFloat(document.getElementById('userType').value);
            const baoHao = parseFloat(document.getElementById('baoHao').value);
            const channel = parseFloat(document.getElementById('channel').value);
            const holiday = parseFloat(document.getElementById('holiday').value);
            const starFactor = Math.min(Math.max(parseFloat(document.getElementById('starFactor').value) || 1.0, 0), 3);
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 1.0;
            
            // 融合选项
            const yikuanChecked = document.getElementById('yikuan').checked;
            const fttrChecked = document.getElementById('fttr').checked;

            // 计算融合系数
            let fusion = 0;
            document.querySelectorAll('input[name="fusion"]:checked').forEach(checkbox => {
                fusion += parseFloat(checkbox.value);
            });

            // 获取套餐参数
            const base = packageRules[package].base;
            const value = packageRules[package].value;

            // 计算基础积分
            let total =base* userType * (value + fusion) * baoHao * channel * holiday;

            // 安调费计算
            let adjustmentFee = 0;
            let feeRule = "";
            if(yikuanChecked) {
                if(!fttrChecked) {
                    adjustmentFee = (58-50)*0.6;
                    feeRule = `安调费 = (58-50)×60% = ${adjustmentFee}分`;
                } else {
                    if(package < 399) {
                        adjustmentFee = (200-150)*0.6;
                        feeRule = `安调费 = (200-150)×60% = ${adjustmentFee.toFixed(1)}分`;}
                }
                total += adjustmentFee;
            }

            // 应用星级系数
            total *= starFactor;

            // 计算薪酬金额
            const totalPoints = total.toFixed(1);
            const totalAmount = (total * unitPrice).toFixed(2);

            // 显示结果
            document.getElementById('result').innerHTML = `
                <strong>基础积分构成：</strong><br>
                套餐基数：${base} ×<br>
                用户系数：${userType} ×<br>
                价值体系：${value} + ${fusion} = ${(value+fusion).toFixed(1)} ×<br>
                名单制系数：${baoHao} ×<br>
                渠道系数：${channel} ×<br>
                节日系数：${holiday} ×<br>
                作业贡献系数：${starFactor.toFixed(1)}<br>
                ${feeRule ? `<hr><strong>安调费规则：</strong><br>${feeRule}` : ''}
                <hr>
                <strong>最终积分：${totalPoints}分</strong><br>
                <strong class="highlight">薪酬金额：￥${totalAmount}</strong><br>
                <em>计算公式：${totalPoints}分 × ${unitPrice}元/分 = ￥${totalAmount}</em>
            `;
        }
    </script>
</body>
</html>
